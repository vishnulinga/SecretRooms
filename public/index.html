<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta property="og:title" content="HushrChat" />
    <meta property="og:description" content="Temporary shared chat rooms" />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:type" content="website" />
    <title>Hushr Chat</title>
    <link rel="icon" href="/logo.svg" type="image/svg+xml" />
    <link rel="shortcut icon" href="/logo.svg" />
    
    <link rel="stylesheet" href="/styles.css" />

  </head>
  <body>
    <main class="shell center-shell">
      <section class="card hero-card hero-card-compact">
        <div class="brand">
        <img src="/favicon.svg" alt="HushrChat logo" class="brand-logo" />
        <span class="brand-name">HushrChat</span>
        </div>
        <p class="eyebrow">Incognito Chat Rooms</p>
        <h1>Talk Freely. Leave Nothing Behind</h1>
        <p class="subtext">
          Create instant chat rooms and share them with anyone.<br>
No accounts. No clutter. Just real conversations.
        </p>

        <div class="quick-create-grid">
          <button id="createPrivateRoomBtn" class="quick-create-btn quick-create-private">
            <span class="quick-create-title">Create Private Room</span>
            <span class="quick-create-desc">Anyone who joins with the link can kill the room for everyone.</span>
          </button>

          <button id="createAdminRoomBtn" class="quick-create-btn quick-create-admin">
            <span class="quick-create-title">Create Admin Room</span>
            <span class="quick-create-desc">Only the admin can kill the room. Users can delete only their own messages.</span>
          </button>
        </div>
      </section>
    </main>

    <script src="/index.js"></script>
  </body>
</html>
